name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME:-manual}"
          version="${version//\//-}"
          package_dir="dist/package"
          archive="araneae-${version}-${GOOS}-${GOARCH}.tar.gz"
          binary=araneae
          if [ "$GOOS" = windows ]; then
            binary=araneae.exe
          fi
          rm -rf "$package_dir"
          mkdir -p "$package_dir"
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags="-s -w" -o "$package_dir/$binary" ./cmd/araneae
          tar -czf "dist/$archive" -C "$package_dir" "$binary"

      - uses: actions/upload-artifact@v4
        with:
          name: araneae-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: araneae-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum araneae-*.tar.gz > checksums.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/araneae-*.tar.gz \
            dist/checksums.txt \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag

      - name: Upload workflow-dispatch dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: araneae-release-dry-run
          path: dist/*
          if-no-files-found: error
